<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Relocation Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; overflow: hidden; height: 100vh; }
        #map { width: 100vw; height: 100vh; }

        .map-marker {
            width: 18px; height: 18px; background: #fff; border: 3px solid #6366f1;
            border-radius: 50%; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 0 0 rgba(99,102,241,0.4); position: relative;
        }
        .map-marker:hover, .map-marker.active {
            transform: scale(1.3); box-shadow: 0 0 0 8px rgba(99,102,241,0.15);
            background: #6366f1; border-color: #fff;
        }
        .marker-tooltip {
            position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
            background: rgba(15,15,20,0.92); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
            padding: 8px 14px; white-space: nowrap; pointer-events: none;
            opacity: 0; transition: opacity 0.2s;
        }
        .map-marker:hover .marker-tooltip { opacity: 1; }
        .marker-tooltip-city { font-size: 13px; font-weight: 600; color: #fff; }
        .marker-tooltip-country { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
        .marker-tooltip-rank { font-size: 10px; color: #a5b4fc; margin-top: 2px; font-weight: 600; }

        .info-panel {
            position: fixed; top: 0; right: -500px; width: 500px; height: 100vh;
            background: rgba(15,15,20,0.97); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255,255,255,0.06);
            z-index: 1000; transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto; overflow-x: hidden;
        }
        .info-panel.open { right: 0; }
        .info-panel::-webkit-scrollbar { width: 4px; }
        .info-panel::-webkit-scrollbar-track { background: transparent; }
        .info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .panel-header {
            position: sticky; top: 0; z-index: 10; padding: 28px 32px 20px;
            background: rgba(15,15,20,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .panel-close {
            position: absolute; top: 20px; right: 24px; width: 32px; height: 32px; border: none;
            background: rgba(255,255,255,0.06); border-radius: 8px; color: rgba(255,255,255,0.5);
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .panel-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .panel-flag { font-size: 36px; margin-bottom: 8px; }
        .panel-city { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; line-height: 1.2; }
        .panel-country { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
        .panel-rank-badge {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 12px;
            background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px; font-size: 12px; font-weight: 600; color: #a5b4fc;
        }
        .panel-body { padding: 8px 32px 40px; }

        .section { margin-top: 28px; }
        .section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 14px; }
        .section-text { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.7); font-weight: 300; }
        .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 28px 0 0; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 14px 16px; }
        .stat-value { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; font-weight: 500; }

        .religion-bars { display: flex; flex-direction: column; gap: 10px; }
        .religion-row { display: flex; align-items: center; gap: 12px; }
        .religion-name { font-size: 13px; color: rgba(255,255,255,0.6); width: 110px; flex-shrink: 0; }
        .religion-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
        .religion-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
        .religion-pct { font-size: 13px; color: rgba(255,255,255,0.5); width: 38px; text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; }

        .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .pros-cons-column h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .pros-cons-column.pros h4 { color: #4ade80; }
        .pros-cons-column.cons h4 { color: #f87171; }
        .pros-cons-column ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .pros-cons-column li { font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.6); padding-left: 14px; position: relative; font-weight: 300; }
        .pros-cons-column.pros li::before { content: '+'; position: absolute; left: 0; color: #4ade80; font-weight: 600; }
        .pros-cons-column.cons li::before { content: '−'; position: absolute; left: 0; color: #f87171; font-weight: 600; }

        .cost-rows { display: flex; flex-direction: column; gap: 8px; }
        .cost-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .cost-row-label { font-size: 13px; color: rgba(255,255,255,0.55); }
        .cost-row-value { font-size: 14px; color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }

        /* Visa section */
        .visa-grid { display: flex; flex-direction: column; gap: 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .visa-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 12px; }
        .visa-row:last-child { border-bottom: none; }
        .visa-row-label { font-size: 12px; color: rgba(255,255,255,0.4); width: 130px; flex-shrink: 0; font-weight: 500; line-height: 1.5; }
        .visa-row-value { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 400; text-align: right; flex: 1; line-height: 1.5; }
        .visa-row-value.yes { color: #4ade80; }
        .visa-row-value.no { color: #f87171; }

        /* Tax callout */
        .tax-callout { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.15); border-radius: 12px; padding: 18px 20px; }
        .tax-amount { font-size: 26px; font-weight: 700; color: #a5b4fc; letter-spacing: -0.5px; }
        .tax-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .tax-note { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 10px; line-height: 1.6; font-weight: 300; }

        .title-bar {
            position: fixed; top: 24px; left: 24px; z-index: 999;
            background: rgba(15,15,20,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 22px;
        }
        .title-bar h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
        .title-bar p { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }

        .compare-btn {
            position: fixed; top: 100px; left: 24px; z-index: 999;
            background: rgba(99,102,241,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99,102,241,0.25); border-radius: 12px; padding: 12px 20px;
            color: #a5b4fc; font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .compare-btn:hover { background: rgba(99,102,241,0.25); color: #fff; }
        .compare-btn svg { width: 16px; height: 16px; }

        .compare-drawer {
            position: fixed; top: 0; left: -520px; width: 520px; height: 100vh;
            background: rgba(15,15,20,0.97); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255,255,255,0.06);
            z-index: 1001; transition: left 0.4s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto; overflow-x: hidden;
        }
        .compare-drawer.open { left: 0; }
        .compare-drawer::-webkit-scrollbar { width: 4px; }
        .compare-drawer::-webkit-scrollbar-track { background: transparent; }
        .compare-drawer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .drawer-header {
            position: sticky; top: 0; z-index: 10; padding: 28px 28px 20px;
            background: rgba(15,15,20,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex; justify-content: space-between; align-items: center;
        }
        .drawer-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
        .drawer-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .drawer-close {
            width: 32px; height: 32px; border: none; background: rgba(255,255,255,0.06);
            border-radius: 8px; color: rgba(255,255,255,0.5); font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .drawer-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .drawer-list { padding: 12px 16px 40px; display: flex; flex-direction: column; gap: 10px; }

        .compare-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px; padding: 18px 20px; cursor: pointer; transition: all 0.2s;
        }
        .compare-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(99,102,241,0.3); }

        .cc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .cc-city-info { display: flex; align-items: center; gap: 10px; }
        .cc-rank {
            width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .cc-rank.top3 { background: rgba(99,102,241,0.25); }
        .cc-rank.rest { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
        .cc-flag { font-size: 20px; }
        .cc-name { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
        .cc-country { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }

        .cc-stats { display: flex; gap: 16px; margin-bottom: 12px; }
        .cc-stat-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.8px; }
        .cc-stat-value { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); margin-top: 1px; }

        .cc-religion { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
        .cc-religion-seg { height: 100%; transition: width 0.4s; }
        .cc-religion-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .cc-religion-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: rgba(255,255,255,0.4); }
        .cc-religion-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        .cc-proscons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cc-proscons-col { font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.5); font-weight: 300; }
        .cc-proscons-col strong { font-weight: 600; font-size: 11px; }
        .cc-proscons-col.pros strong { color: #4ade80; }
        .cc-proscons-col.cons strong { color: #f87171; }

        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .drawer-overlay.visible { opacity: 1; pointer-events: auto; }

        .leaflet-container { background: #0a0a0a; }
        .leaflet-control-attribution { background: rgba(0,0,0,0.6) !important; color: rgba(255,255,255,0.3) !important; font-size: 10px !important; }
        .leaflet-control-attribution a { color: rgba(255,255,255,0.4) !important; }

        @media (max-width: 600px) {
            .info-panel { width: 100vw; right: -100vw; }
            .compare-drawer { width: 100vw; left: -100vw; }
            .panel-header, .drawer-header { padding: 24px 20px 16px; }
            .panel-body { padding: 8px 20px 40px; }
            .drawer-list { padding: 12px 12px 40px; }
            .pros-cons { grid-template-columns: 1fr; gap: 16px; }
            .title-bar { top: 16px; left: 16px; }
            .compare-btn { top: 88px; left: 16px; }
        }

        .gallery { position: relative; width: 100%; height: 220px; border-radius: 12px; overflow: hidden; margin-top: 8px; }
        .gallery img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; }
        .gallery img.active { opacity: 1; }
        .gallery-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
        .gallery-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: background 0.3s; }
        .gallery-dot.active { background: #fff; }
        .gallery-counter { position: absolute; top: 8px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; z-index: 2; }
        .gallery-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.45); color: #fff; border: none; cursor: pointer; z-index: 3; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.2s; backdrop-filter: blur(4px); }
        .gallery-arrow:hover { background: rgba(0,0,0,0.7); }
        .gallery-arrow.left { left: 8px; }
        .gallery-arrow.right { right: 8px; }
    </style>
</head>
<body>

<div class="title-bar">
    <h1>Europe Relocation Map</h1>
    <p>20 cities ranked for your family — click a pin to explore</p>
</div>

<button class="compare-btn" id="compareBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
    Compare All
</button>

<div id="map"></div>

<div class="info-panel" id="infoPanel">
    <div class="panel-header">
        <button class="panel-close" id="panelClose">×</button>
        <div class="panel-flag" id="panelFlag"></div>
        <div class="panel-city" id="panelCity"></div>
        <div class="panel-country" id="panelCountry"></div>
        <div class="panel-rank-badge" id="panelRank"></div>
    </div>
    <div class="panel-body" id="panelBody"></div>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="compare-drawer" id="compareDrawer">
    <div class="drawer-header">
        <div>
            <div class="drawer-title">All Cities Ranked</div>
            <div class="drawer-subtitle">Sorted by overall match to your family</div>
        </div>
        <button class="drawer-close" id="drawerClose">×</button>
    </div>
    <div class="drawer-list" id="drawerList"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
    center: [45, 6], zoom: 5, zoomControl: false, dragging: false,
    scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false, boxZoom: false, keyboard: false
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const locations = {

granada: {
    lat: 37.1773, lng: -3.5986, flag: '🇪🇸', city: 'Granada', country: 'Spain', rank: 1,
    population: '230K', familyCost: '€1,900/mo', summerHigh: '34°C', winterLow: '2°C', beach: '45 min drive',
    overview: `~230K at the foot of the Sierra Nevada. Deep Moorish and North African heritage — one of Spain's most culturally diverse cities. Your daughter would see herself reflected everywhere. Albaicín has village-like community. Cheapest city in Western Europe. Legendary free-tapas culture designed to build community. People are exceptionally warm. The Alhambra is in your city.`,
    religion: [
        { name: 'Irreligious', pct: 52, color: '#22d3ee' }, { name: 'Catholic', pct: 40, color: '#818cf8' },
        { name: 'Muslim', pct: 4, color: '#6ee7b7' }, { name: 'Other', pct: 3, color: '#94a3b8' },
        { name: 'Protestant', pct: 1, color: '#fbbf24' }
    ],
    pros: ['Cheapest city in Western Europe','Moorish heritage — culturally diverse','Daughter would see herself everywhere','Free tapas builds community','Exceptionally warm people','Albaicín — village-like tight-knit','Sierra Nevada skiing/hiking','Alhambra in your city'],
    cons: ['Limited job market','Beach 45 min away','Summer heat extreme (40°C+)','Less international infrastructure','Can feel isolated','Limited international flights'],
    costs: [{ label: '2-Bedroom Apartment', value: '€550–900' },{ label: 'Groceries (family)', value: '€320–420' },{ label: 'Utilities', value: '€100–150' },{ label: 'Dining Out (meal for 2)', value: '€20–35' }],
    familyLife: `Everything walkable, neighbors know each other. Free tapas is social ritual. Albaicín is UNESCO village inside a city. Sierra Nevada for skiing/hiking. Barista knows your name in a week.`,
    visaDetails: [
        { label: 'Remote Work (You)', value: 'Digital Nomad Visa — €2,850/mo minimum' },
        { label: 'Remote Work (Wife)', value: 'Included as dependent on DN visa' },
        { label: 'In-Country Work', value: 'Employer-sponsored permit or autónomo (self-employed)' },
        { label: 'Permanent Residency', value: '5 years of legal residence' },
        { label: 'Citizenship', value: '10 years — must renounce US passport' },
        { label: 'Dual Citizenship', value: 'No — Spain requires renunciation', cls: 'no' }
    ],
    taxTakeHome: '~€70,000',
    taxNote: 'Beckham Law: flat 24% for first 6 years as new tax resident. Without it, progressive 19–45% (effective ~30%), take-home ~€64,000.',
},

sarajevo: {
    lat: 43.8563, lng: 18.4131, flag: '🇧🇦', city: 'Sarajevo', country: 'Bosnia & Herzegovina', rank: 2,
    population: '280K', familyCost: '€1,600/mo', summerHigh: '27°C', winterLow: '-1°C', beach: '4+ hours',
    overview: `The most religiously diverse city in Europe — mosques, Orthodox churches, Catholic cathedrals, and a historic synagogue within a 5-minute walk in the old town. Sarajevo is a place where faith is lived openly and pluralistically, making it an extraordinary landscape for church planting.\n\nBasically two cities: the Ottoman old town (Baščaršija) with copper workshops, čevapi stands, and narrow lanes; and the Austro-Hungarian new town with wide boulevards and coffee houses. Both are walkable and alive.\n\nThe kafana (coffee house) culture is the social backbone — neighbors sit together for hours over Bosnian coffee. Community here isn't an aspiration, it's the default. Bosnians are famously warm and will feed you before they know your name.\n\nSurrounded by mountains on all sides. Skiing 20 minutes from the city center (1984 Winter Olympics). Very affordable. Not EU, but safe, stable, and increasingly connected. English growing fast among younger generation.`,
    religion: [
        { name: 'Muslim', pct: 45, color: '#6ee7b7' }, { name: 'Orthodox', pct: 30, color: '#818cf8' },
        { name: 'Catholic', pct: 15, color: '#f97316' }, { name: 'Irreligious', pct: 7, color: '#22d3ee' },
        { name: 'Other', pct: 3, color: '#94a3b8' }
    ],
    pros: ['Most religiously diverse city in Europe','Kafana culture — community is the default','Bosnian warmth — fed before they know your name','Incredibly affordable','Walkable old town + Austro-Hungarian new town','Mountains on all sides — skiing 20 min away','Unique spiritual landscape for church planting','Rich cultural layers — Ottoman, Austrian, Yugoslav'],
    cons: ['Not EU (candidate country)','Cold snowy winters','Post-war scars still visible','Bosnian bureaucracy is slow','Air quality issues in winter','Economy weaker than EU neighbors','Political structure is complex'],
    costs: [{ label: '2-Bedroom Apartment', value: '€400–700' },{ label: 'Groceries (family)', value: '€250–350' },{ label: 'Utilities', value: '€80–130' },{ label: 'Dining Out (meal for 2)', value: '€15–25' },{ label: 'Public Transit', value: '€25/mo' }],
    familyLife: `Baščaršija is a car-free wonderland for kids. Vrelo Bosne park is the family weekend spot. Mountains mean skiing in winter and hiking in summer. Evening korzo on Ferhadija street is nightly family time. Bosnian coffee ritual is taught to children — it's about slowing down and being together.`,
    visaDetails: [
        { label: 'Remote Work (You)', value: 'Temporary residence + freelance permit (no formal DN visa)' },
        { label: 'Remote Work (Wife)', value: 'Family reunification residence permit' },
        { label: 'In-Country Work', value: 'Work permit required via employer' },
        { label: 'Permanent Residency', value: '5 years of legal residence' },
        { label: 'Citizenship', value: '8 years of permanent residency' },
        { label: 'Dual Citizenship', value: 'Yes — Bosnia allows dual nationality', cls: 'yes' }
    ],
    taxTakeHome: '~€83,000',
    taxNote: 'Flat 10% income tax. One of the lowest tax burdens in Europe.',
},

pontevedra: {

const imageCache = {};
let galleryInterval = null;

async function fetchCityImages(key) {
    if (imageCache[key]) return imageCache[key];
    const title = wikiTitles[key] || locations[key]?.city || key;
    try {
        // Step 1: Get image file names from the Wikipedia article
        const listUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=images&imlimit=50&format=json&origin=*`;
        const listRes = await fetch(listUrl);
        const listData = await listRes.json();
        const pages = listData.query?.pages || {};
        const page = Object.values(pages)[0];
        const images = page?.images || [];

        const skip = /logo|icon|flag|coat|emblem|seal|map|diagram|plan|chart|stub|edit|arrow|symbol|\.svg|commons-logo|wiki|question_book|ambox|padlock|disambig|crystal|folder|nuvola|increase|decrease|steady/i;
        const jpgs = images
            .filter(img => !skip.test(img.title) && /\.(jpe?g)$/i.test(img.title))
            .slice(0, 10);

        if (!jpgs.length) { imageCache[key] = []; return []; }

        // Step 2: Get actual image URLs
        const fileTitles = jpgs.map(img => img.title).join('|');
        const infoUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(fileTitles)}&prop=imageinfo&iiprop=url&iiurlwidth=800&format=json&origin=*`;
        const infoRes = await fetch(infoUrl);
        const infoData = await infoRes.json();
        const infoPages = infoData.query?.pages || {};

        const urls = Object.values(infoPages)
            .map(p => p.imageinfo?.[0]?.thumburl || p.imageinfo?.[0]?.url)
            .filter(Boolean);

        imageCache[key] = urls;
        return urls;
    } catch (e) {
        console.error('Gallery fetch failed:', e);
        imageCache[key] = [];
        return [];
    }
}

const sortedKeys = Object.keys(locations).sort((a, b) => locations[a].rank - locations[b].rank);

let activeMarker = null;
const markers = {};

function createMarkerIcon(city, country, rank) {
    return L.divIcon({
        className: '',
        html: `<div class="map-marker">
            <div class="marker-tooltip">
                <div class="marker-tooltip-city">${city}</div>
                <div class="marker-tooltip-country">${country}</div>
                <div class="marker-tooltip-rank">#${rank} match</div>
            </div>
        </div>`,
        iconSize: [18, 18], iconAnchor: [9, 9]
    });
}

Object.entries(locations).forEach(([key, loc]) => {
    const marker = L.marker([loc.lat, loc.lng], {
        icon: createMarkerIcon(loc.city, loc.country, loc.rank)
    }).addTo(map);
    markers[key] = marker;
    marker.on('click', () => {
        closeDrawer();
        activateMarker(marker);
        openPanel(key);
    });
});

function activateMarker(marker) {
    if (activeMarker) {
        const prev = activeMarker.getElement()?.querySelector('.map-marker');
        if (prev) prev.classList.remove('active');
    }
    const el = marker.getElement()?.querySelector('.map-marker');
    if (el) el.classList.add('active');
    activeMarker = marker;
}

const panel = document.getElementById('infoPanel');
document.getElementById('panelClose').addEventListener('click', closePanel);

function closePanel() {
    panel.classList.remove('open');
    if (galleryInterval) { clearInterval(galleryInterval); galleryInterval = null; }
    if (activeMarker) {
        const el = activeMarker.getElement()?.querySelector('.map-marker');
        if (el) el.classList.remove('active');
        activeMarker = null;
    }
}

function openPanel(key) {
    const loc = locations[key];

        <div class="divider"></div>
        <div class="section"><div class="section-label">Visa & Residency</div>
            <div class="visa-grid">${loc.visaDetails.map(v => `<div class="visa-row"><span class="visa-row-label">${v.label}</span><span class="visa-row-value${v.cls ? ' ' + v.cls : ''}">${v.value}</span></div>`).join('')}</div>
        </div>
        <div class="divider"></div>
        <div class="section"><div class="section-label">Tax on $100K USD Income</div>
            <div class="tax-callout">
                <div class="tax-amount">${loc.taxTakeHome}</div>
                <div class="tax-subtitle">Estimated take-home (€92K gross at current rates)</div>
                <div class="tax-note">${loc.taxNote}<br><br>US citizens: Foreign Earned Income Exclusion covers ~$126K, so you'd generally only pay local taxes (not double-taxed). Consult a cross-border tax advisor.</div>
            </div>
        </div>
        <div class="divider"></div>
        <div class="section"><div class="section-label">Overview</div><div class="section-text">${loc.overview.replace(/\n/g,'<br>')}</div></div>
        <div class="divider"></div>
        <div class="section"><div class="section-label">Cost of Living</div>
            <div class="cost-rows">${loc.costs.map(c => `<div class="cost-row"><span class="cost-row-label">${c.label}</span><span class="cost-row-value">${c.value}</span></div>`).join('')}</div>
        </div>
        <div class="divider"></div>
        <div class="section"><div class="section-label">Religious Demographics</div>
            <div class="religion-bars">${loc.religion.map(r => `<div class="religion-row"><span class="religion-name">${r.name}</span><div class="religion-bar-track"><div class="religion-bar-fill" style="width:${r.pct}%;background:${r.color};"></div></div><span class="religion-pct">${r.pct}%</span></div>`).join('')}</div>
        </div>
        <div class="divider"></div>
        <div class="section"><div class="section-label">Pros & Cons</div>
            <div class="pros-cons">
                <div class="pros-cons-column pros"><h4>Pros</h4><ul>${loc.pros.map(p => `<li>${p}</li>`).join('')}</ul></div>
                <div class="pros-cons-column cons"><h4>Cons</h4><ul>${loc.cons.map(c => `<li>${c}</li>`).join('')}</ul></div>
            </div>
        </div>
        <div class="divider"></div>
        <div class="section"><div class="section-label">Family Life</div><div class="section-text">${loc.familyLife}</div></div>
    `;
    panel.classList.add('open');

    fetchCityImages(key).then(urls => {
        const gal = document.getElementById('cityGallery');
        if (!gal || !urls.length) { if (gal) gal.style.display = 'none'; return; }
        gal.style = '';
        gal.innerHTML = urls.map((u, i) => `<img src="${u}" alt="" class="${i === 0 ? 'active' : ''}">`).join('') +
            `<button class="gallery-arrow left" id="galPrev">&#8249;</button>` +
            `<button class="gallery-arrow right" id="galNext">&#8250;</button>` +
            `<div class="gallery-counter"><span id="galIdx">1</span> / ${urls.length}</div>` +
            `<div class="gallery-dots">${urls.map((_, i) => `<div class="gallery-dot${i === 0 ? ' active' : ''}" data-i="${i}"></div>`).join('')}</div>`;
        let galCur = 0;
        const imgs = gal.querySelectorAll('img');
        const dots = gal.querySelectorAll('.gallery-dot');
        const counter = document.getElementById('galIdx');
        function showSlide(n) {
            imgs.forEach((img, i) => img.classList.toggle('active', i === n));
            dots.forEach((dot, i) => dot.classList.toggle('active', i === n));
            if (counter) counter.textContent = n + 1;
        }
        dots.forEach(dot => dot.addEventListener('click', (e) => {
            galCur = parseInt(e.target.dataset.i);
            showSlide(galCur);
        }));
        document.getElementById('galPrev').addEventListener('click', () => {
            galCur = (galCur - 1 + urls.length) % urls.length;
            showSlide(galCur);
        });
        document.getElementById('galNext').addEventListener('click', () => {
            galCur = (galCur + 1) % urls.length;
            showSlide(galCur);
        });
        galleryInterval = setInterval(() => {
            galCur = (galCur + 1) % urls.length;
            showSlide(galCur);
        }, 3500);
    });
}

const drawer = document.getElementById('compareDrawer');
const overlay = document.getElementById('drawerOverlay');
const drawerList = document.getElementById('drawerList');

document.getElementById('compareBtn').addEventListener('click', openDrawer);
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePanel(); closeDrawer(); } });
map.on('click', () => { closePanel(); closeDrawer(); });

function closeDrawer() {
    drawer.classList.remove('open');
    overlay.classList.remove('visible');
}

function openDrawer() {
    closePanel();
    drawerList.innerHTML = sortedKeys.map(key => {
        const loc = locations[key];
        const topPros = loc.pros.slice(0, 3).join(' · ');
        const topCons = loc.cons.slice(0, 2).join(' · ');
        return `
        <div class="compare-card" data-key="${key}">
            <div class="cc-top">
                <div class="cc-city-info">
                    <div class="cc-rank ${loc.rank <= 3 ? 'top3' : 'rest'}">${loc.rank}</div>
                    <span class="cc-flag">${loc.flag}</span>
                    <div>
                        <div class="cc-name">${loc.city}</div>
                        <div class="cc-country">${loc.country}</div>
                    </div>
                </div>
            </div>
            <div class="cc-stats">
                <div><div class="cc-stat-label">Population</div><div class="cc-stat-value">${loc.population}</div></div>
                <div><div class="cc-stat-label">Family Cost</div><div class="cc-stat-value">${loc.familyCost}</div></div>
                <div><div class="cc-stat-label">Take-Home</div><div class="cc-stat-value">${loc.taxTakeHome}</div></div>
            </div>
            <div class="cc-religion">${loc.religion.map(r => `<div class="cc-religion-seg" style="width:${r.pct}%;background:${r.color};"></div>`).join('')}</div>
            <div class="cc-religion-legend">${loc.religion.map(r => `<span class="cc-religion-legend-item"><span class="cc-religion-dot" style="background:${r.color}"></span>${r.name} ${r.pct}%</span>`).join('')}</div>
            <div class="cc-proscons">
                <div class="cc-proscons-col pros"><strong>Pros</strong><br>${topPros}</div>
                <div class="cc-proscons-col cons"><strong>Cons</strong><br>${topCons}</div>
            </div>
        </div>`;
    }).join('');

    drawerList.querySelectorAll('.compare-card').forEach(card => {
        card.addEventListener('click', () => {
            const key = card.dataset.key;
            closeDrawer();
            activateMarker(markers[key]);
            openPanel(key);
        });
    });

    drawer.classList.add('open');
    overlay.classList.add('visible');
}
</script>
</body>
</html>
